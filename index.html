<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій CodeLife!</title>
    <style>
        body {
            background-color: #03060f;
            background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header { margin-top: 50px; text-align: center; }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1000px;
            margin-top: 40px;
            padding-bottom: 50px;
        }

        .card {
            background: rgba(10, 14, 23, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s, border-color 0.3s;
        }

        .card:hover { transform: translateY(-10px); border-color: #00f0ff; }
        .card-icon { font-size: 2rem; margin-bottom: 10px; }
        h2 { font-size: 1.2rem; margin: 10px 0; }
        p { font-size: 0.9rem; color: #bbc4d0; }

        footer { margin-top: auto; padding: 20px; opacity: 0.7; }
    </style>
</head>
<body>

    <header>
        <h1>МІЙ CODELIFE!</h1>
    </header>

    <main class="cards-grid">
        <div class="card" onclick="openChoice('Книги та Статті')">
            <div class="card-icon">📚</div>
            <h2>Книги та Статті</h2>
            <p>Мої літературні праці та публікації.</p>
        </div>

        <div class="card" onclick="openChoice('Медіатека')">
            <div class="card-icon">🎬</div>
            <h2>Медіатека</h2>
            <p>Відео, музика та анімації.</p>
        </div>

        <div class="card" onclick="openChoice('Софт & Код')">
            <div class="card-icon">💻</div>
            <h2>Софт & Код</h2>
            <p>Мої програми та скрипти.</p>
        </div>

        <div class="card" onclick="openChoice('Мої Світлини')">
            <div class="card-icon">📸</div>
            <h2>Мої Світлини</h2>
            <p>Цифрові картини та фото.</p>
        </div>

        <div class="card" onclick="openInteresting()">
            <div class="card-icon">✨</div>
            <h2>Цікаве для всіх!</h2>
            <p>Медіа, світлини та інше.</p>
        </div>
    </main>

    <footer>
        &copy; 2026 CodeLife. Запрограмовано для майбутнього.
    </footer>

    <script>
        function openChoice(name) {
            alert("Ви обрали: " + name);
        }
        function openInteresting() {
            alert("Ласкаво просимо до розділу 'Цікаве для всіх!'");
        }
    </script>
</body>
</html>
