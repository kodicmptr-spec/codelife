<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Мій Робочий Стіл</title>
    <style>
        body { background: #03060f; margin: 0; font-family: sans-serif; display: flex; flex-wrap: wrap; padding: 20px; }
        
        /* Іконка файлу */
        .file-icon { width: 100px; text-align: center; color: white; cursor: pointer; margin: 20px; }
        .file-icon img { width: 80px; }
        
        /* Вікно, що відкривається */
        #window { display: none; position: fixed; top: 10%; left: 15%; width: 70%; height: 70%; 
                  background: #1a1a2e; border: 2px solid #00f0ff; border-radius: 10px; padding: 20px; }
        .close-btn { color: red; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="file-icon" onclick="openFile('video')">
        <img src="https://cdn-icons-png.flaticon.com/512/1048/1048325.png">
        <p>Мій Фільм.mp4</p>
    </div>

    <div id="window">
        <span class="close-btn" onclick="closeWindow()">[X] ЗАКРИТИ</span>
        <div id="content"></div>
    </div>

    <script>
        function openFile(type) {
            document.getElementById('window').style.display = 'block';
            if(type === 'video') {
                document.getElementById('content').innerHTML = `
                    <video width="100%" controls>
                        <source src="ТВІЙ_ФАЙЛ.mp4" type="video/mp4">
                    </video>`;
            }
        }
        function closeWindow() { document.getElementById('window').style.display = 'none'; }
    </script>
</body>
</html>
