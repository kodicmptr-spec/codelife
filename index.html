<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #03060f;
            background-image: radial-gradient(circle at 20% 30%, #333, transparent), 
                              radial-gradient(circle at 80% 70%, #222, transparent);
            margin: 0; min-height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            font-family: sans-serif; color: white;
        }

        /* Білі "Сонця" (Планети) */
        .sun { position: absolute; border-radius: 50%; z-index: 1; 
               background: radial-gradient(circle at 30% 30%, #fff, #666); 
               box-shadow: 0 0 50px rgba(255,255,255,0.2); }
        .s1 { width: 120px; height: 120px; top: 10%; right: 15%; }
        .s2 { width: 80px; height: 80px; bottom: 10%; left: 10%; }
        .s3 { width: 100px; height: 100px; top: 20%; left: 20%; }

        /* Кульки (Орбітальний рух) */
        .orb { position: absolute; width: 15px; height: 15px; background: #00f0ff; 
               border-radius: 50%; z-index: 0; filter: blur(2px);
               animation: float 20s infinite ease-in-out; }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(50vw, 30vh); }
            66% { transform: translate(20vw, 60vh); }
        }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; 
                      z-index: 5; margin-top: 100px; width: 80%; }
        .card { background: rgba(0,0,0,0.6); padding: 20px; border-radius: 15px; border: 1px solid #00f0ff; 
                text-align: center; cursor: pointer; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

    <div class="sun s1"></div><div class="sun s2"></div><div class="sun s3"></div>
    <div class="orb" style="top: 10%; left: 10%;"></div>
    <div class="orb" style="top: 50%; left: 80%; background: #0088ff;"></div>
    <div class="orb" style="top: 80%; left: 30%; background: #00ffff;"></div>

    <main class="cards-grid">
        <div class="card" onclick="alert('Книги')"><h2>📚 Книги</h2></div>
        <div class="card" onclick="alert('Медіа')"><h2>🎬 Медіа</h2></div>
        <div class="card" onclick="alert('Код')"><h2>💻 Код</h2></div>
        <div class="card" onclick="alert('Світлини')"><h2>📸 Світлини</h2></div>
        <div class="card" onclick="alert('Цікаве')"><h2>✨ Цікаве</h2></div>
    </main>
</body>
</html>
