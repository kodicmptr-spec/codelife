<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Мій CodeLife!</title>
    <style>
        body { background-color: #03060f; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        .cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 90%; max-width: 1000px; margin-top: 50px; }
        .card { background: rgba(10, 14, 23, 0.75); border: 1px solid #00f0ff; padding: 20px; text-align: center; cursor: pointer; border-radius: 12px; }
        
        /* Секція для Відео */
        #video-container { margin-top: 40px; text-align: center; }
        video { width: 560px; border: 2px solid #00f0ff; background: black; }
        .controls { margin-top: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #0088ff; border: none; color: white; border-radius: 5px; }
        button.del { background: #ff4444; }
    </style>
</head>
<body>

    <main class="cards-grid">
        <div class="card"><h2>📚 Книги</h2></div>
        <div class="card"><h2>🎬 Медіатека</h2></div>
        <div class="card"><h2>💻 Софт</h2></div>
        <div class="card"><h2>📸 Світлини</h2></div>
        <div class="card"><h2>✨ Цікаве</h2></div>
        <div class="card" onclick="document.getElementById('filePicker').click()">
            <h2>😂 Гумор!</h2>
        </div>
    </main>

    <input type="file" id="filePicker" accept="video/*" style="display:none" onchange="loadVideo(event)">

    <div id="video-container"></div>

    <script>
        function loadVideo(event) {
            const file = event.target.files[0];
            const url = URL.createObjectURL(file);
            const container = document.getElementById('video-container');
            
            container.innerHTML = `
                <video controls autoplay src="${url}"></video>
                <div class="controls">
                    <button class="del" onclick="removeVideo()">Видалити з сайту</button>
                </div>
            `;
        }

        function removeVideo() {
            document.getElementById('video-container').innerHTML = '';
        }
    </script>
</body>
</html>
