<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Мій CodeLife!</title>
    <style>
        body { background-color: #03060f; color: white; font-family: 'Segoe UI', sans-serif; 
               margin: 0; min-height: 100vh; overflow-x: hidden;
               display: flex; flex-direction: column; align-items: center; }

        /* Планети та анімація кульок */
        .orb { position: absolute; width: 25px; height: 25px; background: #00f0ff; 
               border-radius: 50%; z-index: 0; filter: blur(3px);
               transition: all 5s linear; pointer-events: none; }

        /* Сітка карток */
        .cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; 
                      width: 90%; max-width: 1000px; margin-top: 50px; z-index: 2; position: relative; }
        
        .card { background: rgba(10, 14, 23, 0.75); border: 1px solid rgba(255, 255, 255, 0.1); 
                border-radius: 12px; padding: 25px; text-align: center; cursor: pointer;
                transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #00f0ff; box-shadow: 0 0 20px rgba(0, 240, 255, 0.4); }
        
        h2 { font-size: 1.1rem; margin: 0; color: white; }

        /* Відео контейнер */
        #video-container { margin-top: 30px; text-align: center; z-index: 2; }
        video { width: 500px; border: 2px solid #00f0ff; border-radius: 10px; background: black; }
        .del-btn { margin-top: 10px; padding: 10px 20px; background: #ff4444; border: none; 
                   color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="orb" id="o1"></div><div class="orb" id="o2"></div><div class="orb" id="o3"></div>

    <main class="cards-grid">
        <div class="card"><h2>📚 Мої Книги та Статті</h2></div>
        <div class="card"><h2>🎬 Мої Медіафайли</h2></div>
        <div class="card"><h2>💻 Мої Софт & Коди</h2></div>
        <div class="card"><h2>📸 Мої Світлини</h2></div>
        <div class="card"><h2>✨ Цікаве для всіх!</h2></div>
        <div class="card" onclick="document.getElementById('filePicker').click()"><h2>😂 Гумор!</h2></div>
    </main>

    <input type="file" id="filePicker" accept="video/*" style="display:none" onchange="loadVideo(event)">
    <div id="video-container"></div>

    <script>
        // Анімація кульок
        function moveOrbs() {
            document.querySelectorAll('.orb').forEach(orb => {
                orb.style.left = (Math.random() * 90) + 'vw';
                orb.style.top = (Math.random() * 90) + 'vh';
            });
        }
        setInterval(moveOrbs, 4000);
        moveOrbs();

        // Завантаження відео
        function loadVideo(event) {
            const file = event.target.files[0];
            const url = URL.createObjectURL(file);
            const container = document.getElementById('video-container');
            container.innerHTML = `
                <video controls src="${url}"></video><br>
                <button class="del-btn" onclick="removeVideo()">Видалити відео</button>
            `;
        }

        function removeVideo() {
            document.getElementById('video-container').innerHTML = '';
        }
    </script>
</body>
</html>
