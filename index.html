<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Мій CodeLife!</title>
    <style>
        /* Твій космічний дизайн залишається незмінним */
        body { background-color: #03060f; background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-attachment: fixed; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; font-family: 'Segoe UI', sans-serif; }
        
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; width: 90%; max-width: 1000px; margin-top: 50px; }
        
        .card { background: rgba(10, 14, 23, 0.75); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 25px; text-align: center; cursor: pointer; transition: 0.3s; color: white; }
        .card:hover { transform: translateY(-5px); border-color: #00f0ff; box-shadow: 0 0 20px rgba(0, 240, 255, 0.4); }
    </style>
</head>
<body>

    <main class="cards-grid" id="main-grid"></main>

    <script>
        // Твоя "База даних" — тут ти просто міняєш посилання
        const myFiles = [
            { title: "🎬 Мій фільм", link: "https://drive.google.com/drive/folders/1O0_hzJCyPNXwRXYdCn-AtHQouKz8MHej?usp=drive_link" },
            { title: "💻 Моя програма", link: "https://drive.google.com/drive/folders/1O0_hzJCyPNXwRXYdCn-AtHQouKz8MHej?usp=drive_link" },
            { title: "📸 Світлина", link: "https://drive.google.com/drive/folders/1O0_hzJCyPNXwRXYdCn-AtHQouKz8MHej?usp=drive_link" }
        ];

        const grid = document.getElementById('main-grid');
        myFiles.forEach(file => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<h2>${file.title}</h2><p>Натисни для перегляду</p>`;
            // Відкриваємо файл у новому вікні
            card.onclick = () => window.open(file.link, '_blank');
            grid.appendChild(card);
        });
    </script>
</body>
</html>
